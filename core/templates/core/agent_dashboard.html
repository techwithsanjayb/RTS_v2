{% extends 'core/base.html' %}
{% load static %}

{% block agent_dashboard_%}
{% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <!-- Non-field form errors -->
    {% if UserLoginForm_obj.non_field_errors %}
        <div class="error">
            {{ UserLoginForm_obj.non_field_errors }}
        </div>
    {% endif %}
This is agent dashboard
<a class="nav-link dropdown-toggle show" href="#" data-bs-toggle="dropdown" id="profileDropdown" aria-expanded="true">
          <img src="{% static 'core/assets/images/agents.png' %}" alt="profile">
        </a>
{% endblock %}
